name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =====================================================================
  # Frontend (Next.js)
  # =====================================================================
  frontend:
    name: Frontend (lint + type-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build (sans DuckDB, test de compilation uniquement)
        run: npm run build
        env:
          # Le build n'a pas besoin de la base pour réussir
          DUCKDB_PATH: public/data/euroleague.duckdb

  # =====================================================================
  # Pipeline Python
  # =====================================================================
  pipeline:
    name: Pipeline (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'pipeline/requirements*.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check src tests scripts

      - name: Ruff (format check)
        run: ruff format --check src tests scripts

      - name: Pytest
        run: pytest tests -v --cov=pipeline --cov-report=term-missing
